name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Setup Java JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    # 3. Compile all backend microservices to generate target JARs
    - name: Compile Backend JARs
      run: mvn clean package -DskipTests

    # 4. Set up Docker Buildx (for optimized docker builds)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 5. Build all microservice images using Docker Compose
    - name: Build Docker Images with Compose
      run: docker compose build
